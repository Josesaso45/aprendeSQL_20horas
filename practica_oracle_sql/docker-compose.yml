services:
  oracle-xe:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-xe-local
    ports:
      - "${ORACLE_PORT:-1521}:1521"
      - "${ORACLE_EM_PORT:-5500}:5500"
    environment:
      ORACLE_PASSWORD: "${ORACLE_SYS_PASSWORD}"
      APP_USER: "${ORACLE_APP_USER}"
      APP_USER_PASSWORD: "${ORACLE_APP_PASSWORD}"
    volumes:
      - oracle_xe_data:/opt/oracle/oradata
      - ./init:/container-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 20s
      timeout: 10s
      retries: 10
    restart: unless-stopped

volumes:
  oracle_xe_data:
